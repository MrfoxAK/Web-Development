<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borders</title>
    <style>
        #firstpara{
            background-color: aqua;
            height: 100px;
            width: 400px;

            /* border-width: 4px;
            border-color: blue;
            border-style: solid; */
            border: 4px solid blue;
            border-radius: 15px;
        }

        #secondpara{
            background-color: rgb(78,34,55);
            height: 100px;
            width: 450px;
            border-top: 2px solid green;
            border-right: 34px solid rosybrown;
            border-top-left-radius: 4px;
            border-top-right-radius: 14px;
        }
        #thirdpara{
            height: 100px;
            width: 450px;
            background-image: url('https://static.vecteezy.com/packs/media/components/global/search-explore-nav/img/vectors/term-bg-1-666de2d941529c25aa511dc18d727160.jpg');
            border: 4px solid black;

            background-repeat: no-repeat;
            background-position: center center;

        }
    </style>
</head>
<body>
    <h5>this is border </h5>
    <p id="firstpara">This is a paragraph</p>

    <p id="secondpara">This is a paragraph</p>

    <p id="thirdpara">This is a paragraph</p>
</body>
</html>
