<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors </title>
    <style>
        /* Element sel */
        p{
            border: 2px solid blue;
        }
        /* Id sel */
        #firstpara{
            color: chartreuse;
        }
        .clsofp2{
            color: pink;
        }
        /* class sel */
        .cls{
            background-color: aqua;
        }
        /* Groping sel */
        footer, span{
            color: brown;
        }
    </style>
</head>
<body>
    <h4>CSS Selectors tut</h4>
    <p>This is a p</p>
    <p id="firstpara">This is a p1</p>
    <p id="2ndp" class="clsofp2 cls">This is a p2</p>
    <p>This is a p3</p>
    <div>
        <p>This is a p4</p>
    </div>
    <span>This is span</span>
    <footer>This is footer</footer>
</body>
</html>
