<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        #firstpara{
            color: blanchedalmond; /*color by name*/
        }
        #secondpara{
            color: rgb(0,255,0);
        }
        #thirdpara{
            color: #ffff;
            background-color: black;
        }
    </style>
</head>
<body>
    <h2>This is my 1st box</h2>
    <p id="firstpara">This is a paragraph from 1st box</p>

    <h2>This is my 2nd box</h2>
    <p id="secondpara">This is a paragraph from 2nd box</p>

    <h2>This is my 3rd box</h2>
    <p id="thirdpara">This is a paragraph from 3rd box</p>
</body>
</html>
