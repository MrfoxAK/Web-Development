<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Arrays & Objects</title>
</head>
<body>
     <script>
          let myVar = 34;
          let employee = {
               name: "AK",
               "salary 2": 10,
          }
          console.log(employee);

          let names = [1,2,3,4,"AL",3.4,undefined];
          console.log(names[4]);
          console.log(names.length);

          let names1 = new Array(1,2,3,"akash",5.7);
          names1.push("pushed");
          console.log(names1);
          names1.pop();
          console.log(names1);
          console.log(names1.length);

          let arr = new Array(23);
          console.log(arr);
     </script>
</body>
</html>
