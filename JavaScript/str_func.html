<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>string functions</title>
     <style>

     </style>
</head>
<body>
     <h2>please inspect the page</h2>
     <script>
          var str = "This is a string";
          console.log(str);
          // 1st occerence of a substring
          var pos = str.indexOf('is');
          console.log(pos);

          var pos = str.lastIndexOf('is');
          console.log(pos);

          var sub = str.slice(1,6);
          console.log(sub);

          var sub = str.substring(1,6);
          console.log(sub);

          var sub = str.substr(1,6);
          console.log(sub);

          var rep = str.replace('is','u');
          console.log(rep);
          console.log(str.toLowerCase());
          console.log(str.toUpperCase());
          console.log(str.concat('AL'));

          var strwhitespace = "    this is white space    ";
          console.log(strwhitespace);
          console.log(strwhitespace.trim());

          var char3 = str.charAt(2);
          console.log(char3);
          console.log(str[2]);

     </script>
</body>
</html>
